name: Documentation and Read-only Verification Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-check:
    name: Validate docs and mock verifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check required files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            README.md
            SECURITY.md
            CONTRIBUTING.md
            NOTICE
            LICENSE
            package.json
            docs/TARGET_RUNTIME.md
            docs/EXECUTIVE_SUMMARY.md
            docs/TROUBLESHOOTING_MATRIX.md
            docs/ARCHITECTURE.md
            docs/ROLLBACK_POLICY.md
            docs/OPERATIONAL_VERIFICATION.md
            docs/REDACTION_POLICY.md
            docs/ROADMAP.md
            docs/INCIDENT_TIMELINE.md
            docs/PROJECT_STATUS.md
            docs/RELEASE_NOTES.md
            docs/REPOSITORY_MAP.md
            docs/FINAL_REPORT_AR.md
            evidence/SANITIZED_EVIDENCE_SUMMARY.md
            examples/redacted-environment.example
            examples/mock-session-store/README.md
            examples/mock-session-store/sessions.json
            examples/mock-session-store/transcripts/clean-session.jsonl
            src/README.md
            src/session-store-analyzer.mjs
            tools/README.md
            tools/verify-readonly.mjs
            .github/ISSUE_TEMPLATE/safe-incident-report.md
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty required file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Install project metadata
        shell: bash
        run: npm install --ignore-scripts

      - name: Run read-only verifier against mock data
        shell: bash
        run: npm run check
