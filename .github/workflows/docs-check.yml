name: Documentation Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-check:
    name: Validate public documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            README.md
            SECURITY.md
            CONTRIBUTING.md
            NOTICE
            LICENSE
            package.json
            docs/EXECUTIVE_SUMMARY.md
            docs/TROUBLESHOOTING_MATRIX.md
            docs/ARCHITECTURE.md
            docs/ROLLBACK_POLICY.md
            docs/OPERATIONAL_VERIFICATION.md
            docs/REDACTION_POLICY.md
            docs/ROADMAP.md
            docs/INCIDENT_TIMELINE.md
            docs/PROJECT_STATUS.md
            docs/RELEASE_NOTES.md
            docs/REPOSITORY_MAP.md
            docs/FINAL_REPORT_AR.md
            evidence/SANITIZED_EVIDENCE_SUMMARY.md
            examples/redacted-environment.example
            src/README.md
            tools/README.md
            .github/ISSUE_TEMPLATE/safe-incident-report.md
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty required file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Check for obvious private markers
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'C:\\Users\\[^ ]+|/Users/[^ ]+|/home/[^ ]+|AppData\\Roaming|token=|api[_-]?key|secret=' . \
            --exclude-dir=.git \
            --exclude='.gitignore'; then
            echo "Potential private marker found. Review before publishing."
            exit 1
          fi
          echo "No obvious private markers found."
